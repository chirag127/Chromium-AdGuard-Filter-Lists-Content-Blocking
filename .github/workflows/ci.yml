name: CI

# Controls when the action will run.
# For now, only run this workflow on push to the main branch and for pull requests.
on:
  push:
    branches: ['main']
  pull_request:
    branches: ['main']

# A workflow run is made up of one or more jobs that can run sequentially or in parallel.
jobs:
  # The build job is a composite job that runs a sequence of steps.
  build: 
    # The type of runner that the job will run on.
    runs-on: ubuntu-latest

    # Steps represent a sequence of tasks that will be executed as part of the job.
    # Steps is an array of objects, each of which has a 'uses' and/or 'run' property.
    steps:
      # Checks-out your repository into the clone URL.
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Set up Python environment
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'uv'

      # Install dependencies using uv
      - name: Install Dependencies
        run: uv install

      # Lint and format code using Ruff
      - name: Lint and Format with Ruff
        run: ruff check . && ruff format .

      # Run tests using Pytest
      - name: Run Tests with Pytest
        run: pytest

      # Optional: Upload coverage reports if coverage is enabled and configured
      # - name: Upload coverage to Codecov
      #   uses: codecov/codecov-action@v4
      #   with:
      #     token: ${{ secrets.CODECOV_TOKEN }}
      #     fail_ci_if_error: true
